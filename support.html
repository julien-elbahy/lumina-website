<script>
document.getElementById('btnSend').addEventListener('click',function(){
  var name=document.getElementById('sName').value.trim();
  var email=document.getElementById('sEmail').value.trim();
  var topic=document.getElementById('sTopic').value;
  var msg=document.getElementById('sMsg').value.trim();
  if(!msg){document.getElementById('sendStatus').style.display='block';document.getElementById('sendStatus').style.color='#ef4444';document.getElementById('sendStatus').textContent='Please enter a message.';return}
  var subject=encodeURIComponent('[Lumina Support] '+topic);
  var body=encodeURIComponent('Name: '+(name||'Not provided')+'\nEmail: '+(email||'Not provided')+'\nTopic: '+topic+'\n\n'+msg);
  window.location.href='mai'+'lto:'+'julien'+'.'+'elbahy'+'@'+'gm'+'ail.com?subject='+subject+'&body='+body;
  document.getElementById('sendStatus').style.display='block';document.getElementById('sendStatus').style.color='#22c55e';document.getElementById('sendStatus').textContent='Your email client should open now. If not, send your message directly to julien.elbahy@gmail.com';
});
