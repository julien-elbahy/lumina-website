      - heading "Google Search Console dashboard FAQ" [level=2] [ref=e89]
      - generic [ref=e90]:
        - generic [ref=e91]:
          - button "How is this different from native Search Console? +" [ref=e92] [cursor=pointer]:
            - text: How is this different from native Search Console?
            - generic [ref=e93]: +
          - generic: Native GSC is slow, requires many clicks to compare periods, and has no winners/losers, no low-hanging fruit, no cannibalization detection, and no AI follow-up. Lumina loads all of that in one scroll.
        - generic [ref=e94]:
          - button "Is the dashboard really free? +" [ref=e95] [cursor=pointer]:
            - text: Is the dashboard really free?
            - generic [ref=e96]: +
          - generic: Yes. Free and read-only. The only requirement is an existing Google account with Search Console access. No Lumina account, no subscription, no limits.
        - generic [ref=e97]:
          - button "What data does Lumina access? +" [ref=e98] [cursor=pointer]:
            - text: What data does Lumina access?
            - generic [ref=e99]: +
          - generic: Only the webmasters.readonly OAuth scope — enough to read your GSC Search Analytics data. Lumina cannot modify anything, cannot access other Google services, and your OAuth tokens stay in your browser localStorage on your device.
        - generic [ref=e100]:
          - button "How does the Ask AI button work? +" [ref=e101] [cursor=pointer]:
            - text: How does the Ask AI button work?
            - generic [ref=e102]: +
          - generic: Every row in every table has a small button. Clicking it opens the Lumina Ask AI page with a pre-filled question that references that specific row. The AI copilot then fetches your full GSC context + live SERP data and returns a data-backed answer.
        - generic [ref=e103]:
          - button "Which date ranges work? +" [ref=e104] [cursor=pointer]:
            - text: Which date ranges work?
            - generic [ref=e105]: +
          - generic: 7 days, 28 days, 3 months, 6 months, 12 months, and a custom date range picker. Google's Search Console API returns a maximum of 16 months of historical data.
        - generic [ref=e106]:
          - button "Can I switch between GSC properties? +" [ref=e107] [cursor=pointer]:
            - text: Can I switch between GSC properties?
            - generic [ref=e108]: +
          - generic: Yes. The property dropdown at the top of the dashboard lists all properties from your connected Google account. Switch any time — the dashboard reloads with fresh data.
