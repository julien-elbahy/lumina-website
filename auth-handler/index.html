<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Authenticating… | Lumina SEO</title>
<style>
:root{--bg:#1c1914;--text:#faf7f2;--accent:#eca550;--muted:#a09484;--font:'Plus Jakarta Sans',system-ui,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center}
.wrap{max-width:400px;padding:24px}
h1{font-size:20px;margin-bottom:12px}
p{font-size:14px;color:var(--muted);line-height:1.6}
.spinner{width:32px;height:32px;border:3px solid rgba(236,165,80,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
a{color:var(--accent)}
.site-list{text-align:left;margin:16px 0;display:none}
.site-btn{display:block;width:100%;padding:10px 14px;margin:6px 0;background:rgba(255,245,225,.06);border:1px solid rgba(255,240,215,.10);border-radius:10px;color:var(--text);font-family:var(--font);font-size:14px;cursor:pointer;transition:all .2s;text-align:left}
.site-btn:hover{border-color:var(--accent);background:rgba(236,165,80,.1)}
</style>
</head>
<body>
<div class="wrap">
<div class="spinner" id="spinner"></div>
<h1 id="title">Authenticating…</h1>
<p id="msg">Saving your Google credentials and redirecting…</p>
<div class="site-list" id="siteList"></div>
</div>
<script>
(function(){
  var WORKER='https://lumina-proxy.julien-elbahy.workers.dev/gsc-token';
  var CLIENT_ID='128725149604-7fjs4kr00b43bhq9jnsr0slr1fcd1fl9.apps.googleusercontent.com';

  var params=new URLSearchParams(window.location.search);
  var code=params.get('code');
  var state=params.get('state')||'/';
  var hash=window.location.hash;

  /* ── Legacy implicit flow fallback (access_token in hash) ── */
  if(!code&&hash&&hash.indexOf('access_token')!==-1){
    var hp=new URLSearchParams(hash.substring(1));
    var token=hp.get('access_token');
    var expires=parseInt(hp.get('expires_in')||'3600');
    var hstate=hp.get('state')||'/';
    if(token){
      localStorage.setItem('lumina_gsc_token',token);
      localStorage.setItem('lumina_gsc_expiry',String(Date.now()+expires*1000));
      var rp='/';try{rp=decodeURIComponent(hstate);if(!rp.startsWith('/'))rp='/'}catch(e){rp='/'}
      finishAuth(token,rp);
      return;
    }
  }

  /* ── Authorization Code flow (PKCE) ── */
  if(!code){
    document.getElementById('msg').innerHTML='No authentication data found. <a href="/">Return to Lumina SEO</a>';
    document.getElementById('spinner').style.display='none';
    return;
  }

  var returnPath='/';
  try{returnPath=decodeURIComponent(state);if(!returnPath.startsWith('/'))returnPath='/'}catch(e){returnPath='/'}

  var verifier=sessionStorage.getItem('lumina_gsc_verifier')||'';
  sessionStorage.removeItem('lumina_gsc_verifier');

  var redirect=window.location.origin+'/auth-handler/';
  var body={grant_type:'authorization_code',code:code,redirect_uri:redirect};
  if(verifier)body.code_verifier=verifier;

  fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json()})
    .then(function(data){
      if(data.error){
        document.getElementById('spinner').style.display='none';
        document.getElementById('title').textContent='Authentication failed';
        document.getElementById('msg').innerHTML=data.error+'. <a href="/">Return to Lumina SEO</a>';
        return;
      }
      localStorage.setItem('lumina_gsc_token',data.access_token);
      localStorage.setItem('lumina_gsc_expiry',String(Date.now()+(data.expires_in||3600)*1000));
      if(data.refresh_token)localStorage.setItem('lumina_gsc_refresh',data.refresh_token);
      finishAuth(data.access_token,returnPath);
    })
    .catch(function(err){
      document.getElementById('spinner').style.display='none';
      document.getElementById('title').textContent='Authentication failed';
      document.getElementById('msg').innerHTML='Could not exchange token. <a href="/">Return to Lumina SEO</a>';
    });

  function finishAuth(token,returnPath){
    fetch('https://www.googleapis.com/webmasters/v3/sites',{headers:{'Authorization':'Bearer '+token}})
      .then(function(r){return r.json()})
      .then(function(data){
        var sites=(data.siteEntry||[]).map(function(s){return s.siteUrl});
        if(sites.length<=1){
          if(sites.length===1)localStorage.setItem('lumina_gsc_site',sites[0]);
          window.location.replace(returnPath);
          return;
        }
        document.getElementById('spinner').style.display='none';
        document.getElementById('title').textContent='Select a property';
        document.getElementById('msg').textContent='You have '+sites.length+' GSC properties. Choose which one to use:';
        var list=document.getElementById('siteList');
        list.style.display='block';
        sites.forEach(function(s){
          var btn=document.createElement('button');
          btn.className='site-btn';
          btn.textContent=s.replace(/^sc-domain:/,'📊 ').replace(/^https?:\/\//,'🌐 ');
          btn.addEventListener('click',function(){
            localStorage.setItem('lumina_gsc_site',s);
            window.location.replace(returnPath);
          });
          list.appendChild(btn);
        });
      })
      .catch(function(){window.location.replace(returnPath)});
  }
})();
</script>
<script>(function(){if(typeof gtag!=='function')return;var path=location.pathname;var lang=path.indexOf('/de/')===0?'de':'en';var tn=null,extra={language:lang};var m=path.match(/\/(?:de\/)?tools\/([^\/]+)/);if(m){tn=m[1]==='ki-content-optimierer'?'ai-content-optimizer':m[1]}else if(/^\/(?:de\/)?ask-ai\/?$/.test(path)){tn='ask-ai'}else if(path==='/'||path==='/de/'||path==='/index.html'||path==='/de/index.html'){if(document.getElementById('aaiSend')){tn='ask-ai';extra.location='homepage'}}function fire(){var inp=document.getElementById('aaiInput');var sb=document.getElementById('aaiSend');if(inp&&sb){if(sb.classList.contains('stop'))return;if(!inp.value.trim())return}var d={tool_name:tn};for(var k in extra)d[k]=extra[k];gtag('event','tool_use',d)}if(tn){var ids=['btnGo','btnAnalyze','btnValidate','btnFetch','btnGen'];for(var i=0;i<ids.length;i++){var b=document.getElementById(ids[i]);if(b){b.addEventListener('click',fire);break}}var aai=document.getElementById('aaiSend');if(aai)aai.addEventListener('click',fire);var aaiIn=document.getElementById('aaiInput');if(aaiIn)aaiIn.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing)fire()});var aaiChips=document.getElementById('aaiChips');if(aaiChips)aaiChips.addEventListener('click',function(e){if(e.target.closest('.aai-chip'))fire()})}document.addEventListener('click',function(e){var a=e.target.closest('a[href*="chromewebstore.google.com"]');if(!a)return;var loc='other';if(a.closest('.tn'))loc='nav';else if(a.closest('.mobile-menu'))loc='mobile_menu';else if(a.closest('.hero'))loc='hero';else if(a.closest('.cta-box'))loc='cta_box';else if(a.closest('.cta-section'))loc='cta_section';else if(a.closest('.tf'))loc='footer';gtag('event','cta_click',{cta_location:loc,language:lang})})})()</script>
</body>
</html>
